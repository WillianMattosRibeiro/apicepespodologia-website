services:
  traefik:
    image: traefik:v3.7
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
    networks:
      - home_default
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=home_default
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=will07_mattos@hotmail.com
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web

  apicepes:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apicepespodologia-app
    restart: unless-stopped
    environment:
      PORT: "8001"
    expose:
      - "8001"
    networks:
      - home_default
    labels:
      # HTTPS — router principal
      - traefik.enable=true
      - traefik.docker.network=home_default
      - traefik.http.routers.apicepes.rule=Host(`apicepespodologia.com.br`)
      - traefik.http.routers.apicepes.entrypoints=websecure
      - traefik.http.routers.apicepes.tls=true
      - traefik.http.routers.apicepes.tls.certresolver=letsencrypt
      - traefik.http.routers.apicepes.priority=100
      - traefik.http.services.apicepes.loadbalancer.server.port=8001

      # www → redireciona para o domínio sem www
      - traefik.http.routers.apicepes-www.rule=Host(`www.apicepespodologia.com.br`)
      - traefik.http.routers.apicepes-www.entrypoints=websecure
      - traefik.http.routers.apicepes-www.tls=true
      - traefik.http.routers.apicepes-www.tls.certresolver=letsencrypt
      - traefik.http.routers.apicepes-www.priority=90
      - traefik.http.routers.apicepes-www.middlewares=redirect-to-root-apicepes
      - traefik.http.middlewares.redirect-to-root-apicepes.redirectregex.regex=^https?://(?:www\.)?apicepespodologia\.com\.br/?(.*)$
      - traefik.http.middlewares.redirect-to-root-apicepes.redirectregex.replacement=https://apicepespodologia.com.br/$${1}
      - traefik.http.middlewares.redirect-to-root-apicepes.redirectregex.permanent=true

      # HTTP → redireciona para HTTPS
      - traefik.http.routers.apicepes-http.rule=Host(`apicepespodologia.com.br`) || Host(`www.apicepespodologia.com.br`)
      - traefik.http.routers.apicepes-http.entrypoints=web
      - traefik.http.routers.apicepes-http.priority=80
      - traefik.http.routers.apicepes-http.middlewares=redirect-to-https-apicepes
      - traefik.http.middlewares.redirect-to-https-apicepes.redirectscheme.scheme=https
      - traefik.http.middlewares.redirect-to-https-apicepes.redirectscheme.permanent=true

volumes:
  traefik-letsencrypt:

networks:
  home_default:
    driver: bridge
