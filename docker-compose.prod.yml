services:
  apicepes:
    image: willianmribeiro/prototipos:apicepes
    container_name: apicepespodologia-app
    restart: unless-stopped
    environment:
      PORT: "8001"
    expose:
      - "8001"
    networks:
      - apicepespodologia-net
    labels:
      - traefik.enable=true
      - traefik.docker.network=apicepespodologia-net
      - traefik.http.routers.apicepes.rule=Host(`apicepespodologia.com.br`)
      - traefik.http.routers.apicepes.entrypoints=websecure
      - traefik.http.routers.apicepes.tls=true
      - traefik.http.routers.apicepes.tls.certresolver=letsencrypt
      - traefik.http.services.apicepes.loadbalancer.server.port=8001
      - traefik.http.routers.apicepes-www.rule=Host(`www.apicepespodologia.com.br`)
      - traefik.http.routers.apicepes-www.entrypoints=websecure
      - traefik.http.routers.apicepes-www.tls=true
      - traefik.http.routers.apicepes-www.tls.certresolver=letsencrypt
      - traefik.http.routers.apicepes-www.priority=100
      - traefik.http.routers.apicepes-www.middlewares=redirect-to-root
      - traefik.http.routers.apicepes-catchall.rule=HostRegexp(`{host:.+}`)
      - traefik.http.routers.apicepes-catchall.entrypoints=web
      - traefik.http.routers.apicepes-catchall.priority=1
      - traefik.http.routers.apicepes-catchall.middlewares=redirect-to-root
      - traefik.http.middlewares.redirect-to-root.redirectregex.regex=^https?://(?:www\.)?[^/]+/?(.*)$
      - traefik.http.middlewares.redirect-to-root.redirectregex.replacement=https://apicepespodologia.com.br/$${1}
      - traefik.http.middlewares.redirect-to-root.redirectregex.permanent=true

  traefik:
    image: traefik:v3.7
    container_name: apicepespodologia-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
    networks:
      - apicepespodologia-net
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=apicepespodologia-net
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=will07_mattos@hotmail.com
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web

networks:
  apicepespodologia-net:
    driver: bridge

volumes:
  traefik-letsencrypt:
