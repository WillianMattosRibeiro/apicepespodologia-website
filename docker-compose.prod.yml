services:
  apicepes:
    image: willianmribeiro/prototipos:apicepes
    container_name: apicepespodologia-app
    restart: unless-stopped
    environment:
      PORT: "8001"
    expose:
      - "8001"
    networks:
      - apicepespodologia-net

  nginx:
    image: nginx:1.27-alpine
    container_name: apicepespodologia-nginx
    restart: unless-stopped
    depends_on:
      - apicepes
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - apicepespodologia-net

networks:
  apicepespodologia-net:
    driver: bridge
